<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حساباتي | My Links</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0f;
        --card: #13131a;
        --border: rgba(255, 255, 255, 0.07);
        --accent1: #7c50ff;
        --accent2: #ff4fa0;
        --accent3: #00e5ff;
        --text: #f0efff;
        --muted: #7b7a99;
      }

      html,
      body {
        min-height: 100%;
        background: var(--bg);
        font-family: "Tajawal", sans-serif;
        color: var(--text);
        overflow-x: hidden;
      }

      .bg-mesh {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse 60% 50% at 20% 10%,
            rgba(124, 80, 255, 0.18) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 50% 40% at 80% 80%,
            rgba(255, 79, 160, 0.14) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 40% 60% at 60% 30%,
            rgba(0, 229, 255, 0.08) 0%,
            transparent 70%
          );
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px
          );
        background-size: 40px 40px;
      }

      .page {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 48px 20px 60px;
      }

      .avatar-wrap {
        position: relative;
        margin-bottom: 20px;
        animation: floatIn 0.7s cubic-bezier(0.23, 1.1, 0.54, 1) both;
      }
      .avatar-ring {
        width: 108px;
        height: 108px;
        border-radius: 50%;
        background: conic-gradient(
          var(--accent1),
          var(--accent2),
          var(--accent3),
          var(--accent1)
        );
        padding: 3px;
        animation: spinRing 5s linear infinite;
      }
      @keyframes spinRing {
        to {
          transform: rotate(360deg);
        }
      }
      .avatar-inner {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 44px;
        overflow: hidden;
      }
      .avatar-glow {
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(124, 80, 255, 0.4) 0%,
          transparent 70%
        );
        z-index: -1;
        animation: pulse 2.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.6;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.12);
        }
      }

      .profile-name {
        font-size: 1.85rem;
        font-weight: 900;
        background: linear-gradient(135deg, #fff 30%, var(--accent3) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-align: center;
        animation: floatIn 0.8s 0.1s cubic-bezier(0.23, 1.1, 0.54, 1) both;
      }
      .profile-bio {
        color: var(--muted);
        font-size: 0.95rem;
        text-align: center;
        margin-top: 8px;
        max-width: 300px;
        line-height: 1.6;
        animation: floatIn 0.8s 0.18s cubic-bezier(0.23, 1.1, 0.54, 1) both;
      }

      .divider {
        width: 60px;
        height: 2px;
        border-radius: 99px;
        background: linear-gradient(90deg, var(--accent1), var(--accent2));
        margin: 22px auto;
        animation: floatIn 0.8s 0.25s both;
      }

      .links {
        width: 100%;
        max-width: 440px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .link-item {
        display: flex;
        align-items: center;
        gap: 16px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 15px 20px;
        text-decoration: none;
        color: var(--text);
        position: relative;
        overflow: hidden;
        cursor: pointer;
        transition:
          transform 0.25s cubic-bezier(0.23, 1.1, 0.54, 1),
          border-color 0.25s,
          box-shadow 0.25s;
        animation: slideUp 0.6s cubic-bezier(0.23, 1.1, 0.54, 1) both;
      }
      .link-item::before {
        content: "";
        position: absolute;
        inset: 0;
        background: var(
          --hover-gradient,
          linear-gradient(
            135deg,
            rgba(124, 80, 255, 0.08),
            rgba(255, 79, 160, 0.06)
          )
        );
        opacity: 0;
        transition: opacity 0.3s;
        border-radius: inherit;
      }
      .link-item:hover::before {
        opacity: 1;
      }
      .link-item:hover {
        transform: translateY(-3px) scale(1.013);
        border-color: var(--hover-color, var(--accent1));
        box-shadow: 0 8px 32px var(--hover-shadow, rgba(124, 80, 255, 0.22));
      }
      .link-item:active {
        transform: scale(0.98);
      }

      .icon-box {
        width: 46px;
        height: 46px;
        border-radius: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        flex-shrink: 0;
        background: var(--icon-bg, rgba(124, 80, 255, 0.15));
        box-shadow: 0 0 18px var(--icon-glow, rgba(124, 80, 255, 0.3));
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }
      .link-item:hover .icon-box {
        transform: rotate(-6deg) scale(1.08);
        box-shadow: 0 0 28px var(--icon-glow, rgba(124, 80, 255, 0.5));
      }

      .link-text {
        flex: 1;
      }
      .link-title {
        font-size: 1rem;
        font-weight: 700;
      }
      .link-handle {
        font-size: 0.82rem;
        color: var(--muted);
        margin-top: 2px;
      }

      .link-arrow {
        font-size: 1.1rem;
        color: var(--muted);
        transition:
          transform 0.25s,
          color 0.25s;
      }
      .link-item:hover .link-arrow {
        transform: translateX(-6px);
        color: var(--text);
      }

      .inst {
        --hover-color: #e1306c;
        --hover-shadow: rgba(225, 48, 108, 0.25);
        --icon-bg: rgba(225, 48, 108, 0.15);
        --icon-glow: rgba(225, 48, 108, 0.4);
        --hover-gradient: linear-gradient(
          135deg,
          rgba(225, 48, 108, 0.1),
          rgba(255, 100, 130, 0.05)
        );
      }
      .tiktok {
        --hover-color: #69c9d0;
        --hover-shadow: rgba(105, 201, 208, 0.25);
        --icon-bg: rgba(105, 201, 208, 0.12);
        --icon-glow: rgba(105, 201, 208, 0.4);
        --hover-gradient: linear-gradient(
          135deg,
          rgba(105, 201, 208, 0.1),
          rgba(255, 0, 80, 0.04)
        );
      }
      .fb {
        --hover-color: #1877f2;
        --hover-shadow: rgba(24, 119, 242, 0.25);
        --icon-bg: rgba(24, 119, 242, 0.15);
        --icon-glow: rgba(24, 119, 242, 0.4);
        --hover-gradient: linear-gradient(
          135deg,
          rgba(24, 119, 242, 0.1),
          rgba(0, 80, 200, 0.04)
        );
      }
      .tele {
        --hover-color: #26a5e4;
        --hover-shadow: rgba(38, 165, 228, 0.25);
        --icon-bg: rgba(38, 165, 228, 0.15);
        --icon-glow: rgba(38, 165, 228, 0.4);
        --hover-gradient: linear-gradient(
          135deg,
          rgba(38, 165, 228, 0.1),
          rgba(0, 120, 180, 0.04)
        );
      }
      .wa {
        --hover-color: #25d366;
        --hover-shadow: rgba(37, 211, 102, 0.22);
        --icon-bg: rgba(37, 211, 102, 0.12);
        --icon-glow: rgba(37, 211, 102, 0.35);
        --hover-gradient: linear-gradient(
          135deg,
          rgba(37, 211, 102, 0.08),
          rgba(0, 180, 80, 0.04)
        );
      }

      .link-item:nth-child(1) {
        animation-delay: 0.28s;
      }
      .link-item:nth-child(2) {
        animation-delay: 0.36s;
      }
      .link-item:nth-child(3) {
        animation-delay: 0.44s;
      }
      .link-item:nth-child(4) {
        animation-delay: 0.52s;
      }
      .link-item:nth-child(5) {
        animation-delay: 0.6s;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(28px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes floatIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .link-item::after {
        content: "";
        position: absolute;
        top: -60%;
        left: -80%;
        width: 60%;
        height: 200%;
        background: linear-gradient(
          105deg,
          transparent 30%,
          rgba(255, 255, 255, 0.04) 50%,
          transparent 70%
        );
        transform: skewX(-20deg);
        transition: left 0.6s ease;
        pointer-events: none;
      }
      .link-item:hover::after {
        left: 140%;
      }

      .footer {
        margin-top: 40px;
        font-size: 0.78rem;
        color: var(--muted);
        text-align: center;
        animation: floatIn 1s 1s both;
      }
      .footer span {
        background: linear-gradient(90deg, var(--accent1), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>
